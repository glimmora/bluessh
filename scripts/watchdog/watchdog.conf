# ══════════════════════════════════════════════════════════════════════
#  watchdog.conf — Configuration for the Linux build watchdog
# ══════════════════════════════════════════════════════════════════════

# File to watch
WATCHED_FILE="/home/blue/projects/BlueSSH/scripts/build_ubuntu.sh"

# Max auto-fix retry attempts before giving up
MAX_RETRIES=3

# Seconds to wait between retry attempts
RETRY_DELAY=5

# Cooldown after file change before triggering build (prevents rapid-fire)
COOLDOWN_SECONDS=3

# Email notification (leave empty to disable)
# Requires mailutils or sendmail: sudo apt-get install mailutils
NOTIFY_EMAIL=""

# Desktop notifications (requires libnotify-bin / notify-send)
NOTIFY_DESKTOP=true

# Auto-delete logs older than N days
LOG_RETENTION_DAYS=30

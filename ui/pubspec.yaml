name: bluessh
description: High-performance cross-platform remote access client (SSH, SFTP, VNC, RDP)
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  xterm: ^4.0.0
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  riverpod: ^2.5.0
  flutter_riverpod: ^2.5.0
  http: ^1.2.0
  ffi: ^2.1.0
  json_annotation: ^4.9.0
  material_design_icons_flutter: ^7.0.0
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

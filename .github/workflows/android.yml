# .github/workflows/android.yml
name: Android Build
on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  ANDROID_NDK_VERSION: "26.1.10909125"
  FLUTTER_VERSION: "3.19.0"

jobs:
  build-rust-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r${{ env.ANDROID_NDK_VERSION }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Build Rust engine (arm64)
        run: |
          cargo ndk -t arm64-v8a -o engine/target/jniLibs build --release \
            --manifest-path engine/Cargo.toml
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Build Rust engine (x86_64)
        run: |
          cargo ndk -t x86_64 -o engine/target/jniLibs build --release \
            --manifest-path engine/Cargo.toml
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload native libraries
        uses: actions/upload-artifact@v4
        with:
          name: rust-android-libs
          path: |
            engine/target/jniLibs/arm64-v8a/libbluessh.so
            engine/target/jniLibs/x86_64/libbluessh.so

  build-flutter-android:
    needs: build-rust-android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Download native libraries
        uses: actions/download-artifact@v4
        with:
          name: rust-android-libs

      - name: Place native libraries
        run: |
          mkdir -p ui/android/app/src/main/jniLibs/arm64-v8a
          mkdir -p ui/android/app/src/main/jniLibs/x86_64
          cp engine/target/jniLibs/arm64-v8a/libbluessh.so \
             ui/android/app/src/main/jniLibs/arm64-v8a/
          cp engine/target/jniLibs/x86_64/libbluessh.so \
             ui/android/app/src/main/jniLibs/x86_64/

      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: ui

      - name: Analyze Flutter
        run: flutter analyze --fatal-infos
        working-directory: ui

      - name: Run Flutter tests
        run: flutter test
        working-directory: ui

      - name: Build APK
        run: flutter build apk --release
        working-directory: ui

      - name: Build AAB
        if: startsWith(github.ref, 'refs/tags/v')
        run: flutter build appbundle --release
        working-directory: ui

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bluessh-apk
          path: ui/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: bluessh-aab
          path: ui/build/app/outputs/bundle/release/app-release.aab

  sign-and-release:
    needs: build-flutter-android
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: bluessh-apk

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: bluessh-aab

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: .
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Generate checksums
        run: |
          sha256sum *.apk *.aab > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.apk
            *.aab
            SHA256SUMS

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          packageName: com.bluessh
          releaseFiles: app-release.aab
          track: internal
          status: completed
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
